<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1280" role="img" aria-labelledby="title desc">
  <title id="title">XjMVVM production system design</title>
  <desc id="desc">A vertical system design showing Xojo desktop clients, composition, ViewModels, backend selection, PocketBase, SQLite, and direct SQL services.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}.box{stroke:#1f2937;stroke-width:2.4;rx:14}.client{fill:#dbeafe}.app{fill:#dcfce7}.choice{fill:#fef3c7}.server{fill:#fee2e2}.data{fill:#e0f2fe}.t{font-family:Inter,Arial,sans-serif;font-size:23px;font-weight:800;fill:#111827}.s{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#374151}.edge{stroke:#374151;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:7 7}.label{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#4b5563}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="1280"/>
  <text class="t" x="380" y="58" text-anchor="middle">Production System Design</text>
  <text class="s" x="380" y="88" text-anchor="middle">One desktop app, several backend deployment choices.</text>

  <rect class="box client" x="115" y="128" width="530" height="104"/>
  <text class="t" x="380" y="169" text-anchor="middle">Xojo Desktop App</text>
  <text class="s" x="380" y="200" text-anchor="middle">macOS, Windows, Linux desktop clients</text>

  <path class="edge" d="M380 232 V282"/>

  <rect class="box app" x="115" y="282" width="530" height="104"/>
  <text class="t" x="380" y="323" text-anchor="middle">CustomerDesktopAppContext</text>
  <text class="s" x="380" y="354" text-anchor="middle">Creates List and Detail ViewModels</text>

  <path class="edge" d="M380 386 V436"/>

  <rect class="box choice" x="115" y="436" width="530" height="132"/>
  <text class="t" x="380" y="477" text-anchor="middle">Backend Settings</text>
  <text class="s" x="380" y="508" text-anchor="middle">fake, sqlite-file, sql, pocketbase</text>
  <text class="s" x="380" y="538" text-anchor="middle">Chosen by environment, user, or deployment profile</text>

  <path class="edge" d="M380 568 V630"/>
  <text class="label" x="398" y="606">factory builds adapter</text>

  <rect class="box app" x="115" y="630" width="530" height="104"/>
  <text class="t" x="380" y="671" text-anchor="middle">ICustomerRepository</text>
  <text class="s" x="380" y="702" text-anchor="middle">Stable contract used by all ViewModels</text>

  <path class="edge" d="M380 734 V800"/>

  <rect class="box server" x="60" y="800" width="640" height="114"/>
  <text class="t" x="380" y="842" text-anchor="middle">PocketBase REST</text>
  <text class="s" x="380" y="873" text-anchor="middle">Stock executable, auth collection, owner-only rules</text>

  <path class="edge" d="M380 914 V960"/>

  <rect class="box data" x="60" y="960" width="640" height="104"/>
  <text class="t" x="380" y="1001" text-anchor="middle">PocketBase pb_data</text>
  <text class="s" x="380" y="1032" text-anchor="middle">SQLite storage managed by PocketBase</text>

  <path class="edge dash" d="M250 734 C120 790 120 896 250 960"/>
  <text class="label" x="108" y="853">local mode</text>
  <rect class="box data" x="60" y="1088" width="300" height="104"/>
  <text class="t" x="210" y="1129" text-anchor="middle">SQLite File</text>
  <text class="s" x="210" y="1160" text-anchor="middle">Per-user local data</text>

  <path class="edge dash" d="M510 734 C640 790 640 896 510 960"/>
  <text class="label" x="604" y="853">enterprise mode</text>
  <rect class="box data" x="400" y="1088" width="300" height="104"/>
  <text class="t" x="550" y="1129" text-anchor="middle">Direct SQL</text>
  <text class="s" x="550" y="1160" text-anchor="middle">Managed database driver</text>
</svg>
