<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 1300" role="img" aria-labelledby="title desc">
  <title id="title">From RowSet to MVVM</title>
  <desc id="desc">A vertical transformation diagram showing legacy Xojo SQL in Window code moving into a repository, ViewModel, composition root, and backend adapter.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf7}.box{stroke:#1f2937;stroke-width:2.4;rx:14}.old{fill:#fee2e2}.step{fill:#fef3c7}.vm{fill:#dcfce7}.repo{fill:#ede9fe}.view{fill:#dbeafe}.t{font-family:Inter,Arial,sans-serif;font-size:23px;font-weight:800;fill:#111827}.s{font-family:Inter,Arial,sans-serif;font-size:16px;fill:#374151}.m{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#4b5563}.edge{stroke:#374151;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.label{font-family:Inter,Arial,sans-serif;font-size:15px;fill:#4b5563}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#374151"/>
    </marker>
  </defs>
  <rect class="bg" width="760" height="1300"/>
  <text class="t" x="380" y="58" text-anchor="middle">From Direct SQL To MVVM</text>
  <text class="s" x="380" y="88" text-anchor="middle">Keep Xojo classes and RowSet knowledge, move responsibilities to better places.</text>

  <rect class="box old" x="95" y="124" width="570" height="126"/>
  <text class="t" x="380" y="164" text-anchor="middle">Traditional Xojo Window</text>
  <text class="s" x="380" y="196" text-anchor="middle">Button event builds SQL, reads RowSet, fills ListBox</text>
  <text class="m" x="380" y="222" text-anchor="middle">Fast to start, hard to test, hard to change backend</text>

  <path class="edge" d="M380 250 V304"/>
  <text class="label" x="398" y="282">extract business data</text>

  <rect class="box step" x="95" y="304" width="570" height="110"/>
  <text class="t" x="380" y="344" text-anchor="middle">Model</text>
  <text class="s" x="380" y="376" text-anchor="middle">Customer class holds fields and simple behavior</text>
  <text class="m" x="380" y="398" text-anchor="middle">RowSet columns become object properties</text>

  <path class="edge" d="M380 414 V468"/>
  <text class="label" x="398" y="446">name persistence operations</text>

  <rect class="box repo" x="95" y="468" width="570" height="110"/>
  <text class="t" x="380" y="508" text-anchor="middle">Repository Interface</text>
  <text class="s" x="380" y="540" text-anchor="middle">FindPage, Count, FindByID, Save, Delete</text>
  <text class="m" x="380" y="562" text-anchor="middle">The ViewModel talks to this contract</text>

  <path class="edge" d="M380 578 V632"/>
  <text class="label" x="398" y="610">move RowSet code behind the contract</text>

  <rect class="box repo" x="95" y="632" width="570" height="126"/>
  <text class="t" x="380" y="672" text-anchor="middle">SQL Repository Adapter</text>
  <text class="s" x="380" y="704" text-anchor="middle">CustomerRepositorySQL owns SelectSQL and RowSet mapping</text>
  <text class="m" x="380" y="730" text-anchor="middle">The SQL still exists, just no longer inside the Window</text>

  <path class="edge" d="M380 758 V812"/>
  <text class="label" x="398" y="790">put screen behavior in testable code</text>

  <rect class="box vm" x="95" y="812" width="570" height="110"/>
  <text class="t" x="380" y="852" text-anchor="middle">ViewModel</text>
  <text class="s" x="380" y="884" text-anchor="middle">Search, paging, validation status, save commands</text>
  <text class="m" x="380" y="906" text-anchor="middle">Depends on ICustomerRepository, not Database</text>

  <path class="edge" d="M380 922 V976"/>
  <text class="label" x="398" y="954">make Window thin</text>

  <rect class="box view" x="95" y="976" width="570" height="110"/>
  <text class="t" x="380" y="1016" text-anchor="middle">Desktop View</text>
  <text class="s" x="380" y="1048" text-anchor="middle">Controls call ViewModel and render results</text>
  <text class="m" x="380" y="1070" text-anchor="middle">No SQL, no HTTP, no backend switch logic</text>

  <path class="edge" d="M380 1086 V1140"/>
  <text class="label" x="398" y="1118">choose backend at app boundary</text>

  <rect class="box step" x="95" y="1140" width="570" height="110"/>
  <text class="t" x="380" y="1180" text-anchor="middle">Composition Root</text>
  <text class="s" x="380" y="1212" text-anchor="middle">Factory chooses SQLite, SQL, PocketBase, or fake</text>
  <text class="m" x="380" y="1234" text-anchor="middle">The app can evolve without rewriting every Window</text>
</svg>
